# A generic, single database configuration.

[alembic]
# path to migration versions
script_location = alembic

# template used to generate migration file names (e.g. 001_initial_schema_1a2b3c)
file_template = %%(rev)s_%%(slug)s

# The URL is overridden in env.py to use settings
sqlalchemy.url = sqlite:///./caloriq.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
